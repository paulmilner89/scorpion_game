// Web Audio pre-buffered playback — no startup delay, silence trimmed
let _audioCtx = null;
const _audioBufs = {};

async function _initAudio() {
  if (_audioCtx) return;
  _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const clips = { apple: AUDIO_APPLE, hit0: AUDIO_HITS[0], hit1: AUDIO_HITS[1], hit2: AUDIO_HITS[2] };
  for (const [key, src] of Object.entries(clips)) {
    try {
      const resp  = await fetch(src);
      const raw   = await resp.arrayBuffer();
      const buf   = await _audioCtx.decodeAudioData(raw);
      const ch    = buf.getChannelData(0);
      let offset  = 0;
      for (let i = 0; i < ch.length; i++) {
        if (Math.abs(ch[i]) > 0.008) { offset = i / buf.sampleRate; break; }
      }
      _audioBufs[key] = { buf, offset };
    } catch (e) {}
  }
}

function playAudio(key) {
  if (!_audioCtx || !_audioBufs[key]) return;
  try {
    const { buf, offset } = _audioBufs[key];
    const src = _audioCtx.createBufferSource();
    src.buffer = buf;
    src.connect(_audioCtx.destination);
    src.start(0, offset);
  } catch (e) {}
}

// Pre-computed sand texture dots
const SAND_DOTS = Array.from({length: 300}, (_, i) => ({
  x: (i * 137.5 + 50) % W,
  y: (i * 97.3  + 30) % H,
  r: Math.random() * 2 + 0.5,
  a: Math.random() * 0.07 + 0.02
}));

// Game state
let state, score, hearts, elapsed, invincibleUntil, hunger;
let lastAppleAt, lastCactusAt, humansSpawned;
let scorpion, humans, apples, cacti, poisons;
let keys = {};

function init() {
  state           = 'playing';
  score           = 0;
  hearts          = MAX_HEARTS;
  elapsed         = 0;
  invincibleUntil = 0;
  hunger          = 1.0;
  lastAppleAt     = 0;
  lastCactusAt    = 0;
  humansSpawned   = 0;

  scorpion = { x: W / 2, y: H / 2, facing: -Math.PI / 2 };
  humans   = [];
  apples   = [];
  cacti    = [];
  poisons  = [];

  spawnHuman();
  humansSpawned = 1;
  for (let i = 0; i < 3; i++) spawnApple();
}

// Spawning
function spawnHuman() {
  const idx  = humansSpawned;
  const edge = Math.floor(Math.random() * 4);
  let x, y;
  if      (edge === 0) { x = Math.random() * W; y = -20; }
  else if (edge === 1) { x = W + 20;            y = Math.random() * H; }
  else if (edge === 2) { x = Math.random() * W; y = H + 20; }
  else                 { x = -20;               y = Math.random() * H; }

  if (idx === 2) {
    humans.push({
      x, y,
      type: 'tourist',
      stunUntil: 0,
      speed: 2.0,
      wanderAngle: Math.random() * Math.PI * 2,
      wanderTimer: 0.3 + Math.random() * 0.7
    });
  } else {
    humans.push({
      x, y,
      type: 'chaser',
      stunUntil: 0,
      speed: 1.3 + idx * 0.3
    });
  }
}

function spawnApple() {
  apples.push({
    x: 30 + Math.random() * (W - 60),
    y: 40 + Math.random() * (H - 80)
  });
}

function spawnCactus() {
  cacti.push({
    x: 40 + Math.random() * (W - 80),
    y: 50 + Math.random() * (H - 100)
  });
}

// Update
function update(dt) {
  if (state !== 'playing') return;
  elapsed += dt;
  if (elapsed >= GAME_SECS) { state = 'win'; return; }

  // Decay hunger
  hunger = Math.max(0, hunger - HUNGER_DECAY * dt);

  // Spawn humans on schedule
  for (let i = humansSpawned; i < HUMAN_SPAWN_AT.length; i++) {
    if (elapsed >= HUMAN_SPAWN_AT[i]) { spawnHuman(); humansSpawned++; }
  }

  // Apple respawn
  const appleInterval = Math.max(1.2, APPLE_INT_BASE - score * 0.25);
  const appleCap      = Math.min(16,  APPLE_CAP_BASE + Math.floor(score / 2));
  if (elapsed - lastAppleAt >= appleInterval && apples.length < appleCap) {
    spawnApple();
    lastAppleAt = elapsed;
  }

  // Cactus rare spawn
  if (elapsed >= CACTUS_INTERVAL &&
      elapsed - lastCactusAt >= CACTUS_INTERVAL &&
      cacti.length < CACTUS_CAP) {
    spawnCactus();
    lastCactusAt = elapsed;
  }

  // Effective speed based on hunger
  const hungerMult  = hunger > 0.5 ? 1.0 : (hunger > 0.25 ? 0.75 : 0.5);
  const effectiveSpd = SCORPION_SPEED * hungerMult;

  // Move scorpion
  let dx = 0, dy = 0;
  if (keys['ArrowLeft'])  dx -= 1;
  if (keys['ArrowRight']) dx += 1;
  if (keys['ArrowUp'])    dy -= 1;
  if (keys['ArrowDown'])  dy += 1;
  if (dx !== 0 || dy !== 0) {
    const len = Math.hypot(dx, dy);
    dx /= len; dy /= len;
    scorpion.facing = Math.atan2(dy, dx);
  }
  scorpion.x = Math.max(16, Math.min(W - 16, scorpion.x + dx * effectiveSpd));
  scorpion.y = Math.max(16, Math.min(H - 16, scorpion.y + dy * effectiveSpd));

  // Move poison blobs
  for (let p of poisons) {
    p.x   += Math.cos(p.angle) * POISON_SPEED;
    p.y   += Math.sin(p.angle) * POISON_SPEED;
    p.dist += POISON_SPEED;
    p.alive = p.dist < POISON_RANGE && p.x > 0 && p.x < W && p.y > 0 && p.y < H;
  }
  poisons = poisons.filter(p => p.alive);

  const now = Date.now();

  // Move humans
  for (let h of humans) {
    const stunned = now < h.stunUntil;

    for (let p of poisons) {
      if (!p.alive) continue;
      if (Math.hypot(p.x - h.x, p.y - h.y) < 22) {
        h.stunUntil = now + STUN_MS;
        p.alive = false;
      }
    }

    if (!stunned) {
      if (h.type === 'tourist') {
        h.wanderTimer -= dt;
        if (h.wanderTimer <= 0) {
          h.wanderAngle = Math.random() * Math.PI * 2;
          h.wanderTimer = 0.3 + Math.random() * 0.7;
        }
        h.x += Math.cos(h.wanderAngle) * h.speed;
        h.y += Math.sin(h.wanderAngle) * h.speed;
        if (h.x < 10)     { h.x = 10;     h.wanderAngle = Math.PI - h.wanderAngle; }
        if (h.x > W - 10) { h.x = W - 10; h.wanderAngle = Math.PI - h.wanderAngle; }
        if (h.y < 10)     { h.y = 10;     h.wanderAngle = -h.wanderAngle; }
        if (h.y > H - 10) { h.y = H - 10; h.wanderAngle = -h.wanderAngle; }
      } else {
        const dx2 = scorpion.x - h.x;
        const dy2 = scorpion.y - h.y;
        const len2 = Math.hypot(dx2, dy2);
        if (len2 > 0) {
          h.x += (dx2 / len2) * h.speed;
          h.y += (dy2 / len2) * h.speed;
        }
      }
    }

    // Damage scorpion on contact
    if (now > invincibleUntil && Math.hypot(h.x - scorpion.x, h.y - scorpion.y) < 28) {
      hearts--;
      invincibleUntil = now + INVINCIBLE_MS;
      playAudio('hit' + Math.floor(Math.random() * 3));
      if (hearts <= 0) { state = 'lose'; return; }
    }
  }

  // Collect apples
  apples = apples.filter(a => {
    if (Math.hypot(a.x - scorpion.x, a.y - scorpion.y) < 22) {
      score++;
      hunger = Math.min(1, hunger + 0.2);
      playAudio('apple');
      return false;
    }
    return true;
  });

  // Collect cacti
  cacti = cacti.filter(c => {
    if (Math.hypot(c.x - scorpion.x, c.y - scorpion.y) < 26) {
      score += 5;
      if (hearts < MAX_HEARTS) hearts++;
      hunger = Math.min(1, hunger + 0.3);
      return false;
    }
    return true;
  });
}

// Drawing
function drawBackground() {
  ctx.fillStyle = '#c8a55a';
  ctx.fillRect(0, 0, W, H);
  for (const d of SAND_DOTS) {
    ctx.globalAlpha = d.a;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawScorpion() {
  const now = Date.now();
  if (now < invincibleUntil && Math.floor(now / 120) % 2 === 0) return;

  ctx.save();
  ctx.translate(scorpion.x, scorpion.y);
  ctx.rotate(scorpion.facing + Math.PI / 2);

  ctx.fillStyle = '#b07010';
  ctx.beginPath();
  ctx.ellipse(0, 6, 9, 13, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#d09020';
  ctx.beginPath();
  ctx.ellipse(0, -4, 8, 9, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = '#b07010';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(0, 18);
  ctx.quadraticCurveTo(18, 14, 20, 0);
  ctx.quadraticCurveTo(22, -14, 12, -26);
  ctx.stroke();

  ctx.fillStyle = '#ffee00';
  ctx.beginPath(); ctx.arc(12, -26, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ff8800';
  ctx.beginPath(); ctx.arc(12, -26, 2, 0, Math.PI * 2); ctx.fill();

  for (const side of [-1, 1]) {
    ctx.fillStyle = '#c07010';
    ctx.save();
    ctx.translate(side * 11, -8);
    ctx.rotate(side * 0.4);
    ctx.beginPath(); ctx.ellipse(0, 0, 7, 4, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#a06010';
    ctx.beginPath(); ctx.ellipse(side * 6, -3, 4, 2.5, side * 0.6, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  ctx.strokeStyle = '#a06010';
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 4; i++) {
    const ly = -6 + i * 6;
    ctx.beginPath(); ctx.moveTo(-8, ly); ctx.lineTo(-17, ly + 5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(8,  ly); ctx.lineTo(17,  ly + 5); ctx.stroke();
  }

  ctx.restore();
}

function drawNet(stun) {
  ctx.save();
  ctx.translate(12, -8);
  const col = stun ? '#666' : '#886633';
  ctx.strokeStyle = col;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(10, -8); ctx.stroke();
  ctx.strokeStyle = stun ? '#555' : '#aaa';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.ellipse(14, -12, 9, 9, -0.4, 0, Math.PI * 2);
  ctx.stroke();
  ctx.strokeStyle = stun ? '#444' : '#888';
  ctx.lineWidth = 0.8;
  ctx.globalAlpha = 0.7;
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath(); ctx.moveTo(14 + i * 6, -21); ctx.lineTo(14 + i * 6, -3);  ctx.stroke();
    ctx.beginPath(); ctx.moveTo(5,  -12 + i * 5); ctx.lineTo(23, -12 + i * 5); ctx.stroke();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawCamera(stun) {
  ctx.save();
  ctx.translate(11, -8);
  const body = stun ? '#555' : '#222';
  const lens = stun ? '#444' : '#336699';
  ctx.fillStyle = body;
  ctx.fillRect(0, -6, 14, 10);
  ctx.fillRect(4, -9, 6, 4);
  ctx.fillStyle = lens;
  ctx.beginPath(); ctx.arc(7, -1, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = stun ? '#333' : '#88bbdd';
  ctx.beginPath(); ctx.arc(7, -1, 2, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawHuman(h) {
  const now    = Date.now();
  const stun   = now < h.stunUntil;
  const tourist = h.type === 'tourist';
  ctx.save();
  ctx.translate(h.x, h.y);

  if (stun) {
    for (let i = 0; i < 3; i++) {
      const a = (now / 300) + (i * Math.PI * 2 / 3);
      ctx.fillStyle = '#ffee00';
      ctx.beginPath();
      ctx.arc(Math.cos(a) * 16, -32 + Math.sin(a) * 6, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  const skin  = stun ? '#999' : '#f4c080';
  const shirt = stun ? '#666' : (tourist ? '#ff88bb' : '#4488cc');
  const pants = stun ? '#555' : (tourist ? '#dddddd' : '#224488');

  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.arc(0, -18, 8, 0, Math.PI * 2); ctx.fill();

  if (tourist) {
    ctx.fillStyle = stun ? '#777' : '#f0d060';
    ctx.beginPath(); ctx.ellipse(0, -26, 13, 4, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = stun ? '#666' : '#e0c050';
    ctx.beginPath(); ctx.ellipse(0, -27, 7, 5, 0, 0, Math.PI * 2); ctx.fill();
  }

  ctx.fillStyle = shirt;
  ctx.fillRect(-7, -10, 14, 14);

  ctx.fillStyle = skin;
  ctx.fillRect(-13, -10, 6, 10);
  ctx.fillRect(7,   -10, 6, 10);

  ctx.fillStyle = pants;
  ctx.fillRect(-7, 4, 6, 12);
  ctx.fillRect(1,  4, 6, 12);

  ctx.fillStyle = stun ? '#555' : '#222';
  ctx.fillRect(-3, -21, 2, 2);
  ctx.fillRect(1,  -21, 2, 2);

  if (tourist) {
    drawCamera(stun);
  } else {
    drawNet(stun);
  }

  ctx.restore();
}

function drawApple(a) {
  ctx.save();
  ctx.translate(a.x, a.y);
  ctx.fillStyle = '#cc2020';
  ctx.beginPath(); ctx.arc(0, 2, 9, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath(); ctx.ellipse(-3, -2, 4, 3, -0.5, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#5a3010';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(1, -7); ctx.lineTo(3, -13); ctx.stroke();
  ctx.fillStyle = '#30a030';
  ctx.beginPath(); ctx.ellipse(6, -12, 5, 3, -0.4, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawCactus(c) {
  ctx.save();
  ctx.translate(c.x, c.y);

  const green = '#3a8c3a';
  const dark  = '#266626';

  ctx.fillStyle = green;
  ctx.fillRect(-6, -28, 12, 36);

  ctx.fillRect(-18, -18, 13, 8);
  ctx.fillRect(-18, -24, 8, 10);

  ctx.fillRect(5, -12, 13, 8);
  ctx.fillRect(10, -18, 8, 10);

  ctx.strokeStyle = dark;
  ctx.lineWidth = 1;
  const spines = [
    [-6,-20],[-6,-10],[-6,0],[6,-20],[6,-10],[6,0],
    [-18,-16],[-18,-22],[-10,-24],
    [5,-10],[18,-10],[10,-18]
  ];
  for (const [sx, sy] of spines) {
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx - 4, sy - 3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx + 4, sy - 3); ctx.stroke();
  }

  ctx.shadowColor = '#88ff88';
  ctx.shadowBlur = 8;
  ctx.fillStyle = 'rgba(100,255,100,0.15)';
  ctx.beginPath(); ctx.arc(0, -14, 22, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('+5 ♥', 0, -38);

  ctx.restore();
}

function drawPoison(p) {
  ctx.save();
  ctx.shadowColor = '#88ff00';
  ctx.shadowBlur  = 10;
  ctx.fillStyle   = '#aaff00';
  ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawHeart(x, y, filled) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = filled ? '#e03060' : '#442233';
  ctx.beginPath();
  ctx.moveTo(0, 5);
  ctx.bezierCurveTo(-12, -4, -12, -14, 0, -9);
  ctx.bezierCurveTo(12, -14,  12,  -4, 0,  5);
  ctx.fill();
  ctx.restore();
}

function drawHUD() {
  const timeLeft = Math.max(0, GAME_SECS - elapsed);
  const barW = 300, barX = W / 2 - barW / 2;

  // Timer bar
  ctx.fillStyle = '#222';
  ctx.fillRect(barX, 10, barW, 18);
  ctx.fillStyle = timeLeft > 30 ? '#33cc55' : '#cc3333';
  ctx.fillRect(barX, 10, barW * (timeLeft / GAME_SECS), 18);
  ctx.strokeStyle = '#888'; ctx.lineWidth = 1;
  ctx.strokeRect(barX, 10, barW, 18);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`${Math.ceil(timeLeft)}s`, W / 2, 24);

  // Hunger bar
  const hungerColor = hunger > 0.5 ? '#88dd44' : (hunger > 0.25 ? '#ddbb22' : '#ee4422');
  ctx.fillStyle = '#222';
  ctx.fillRect(barX, 33, barW, 10);
  ctx.fillStyle = hungerColor;
  ctx.fillRect(barX, 33, barW * hunger, 10);
  ctx.strokeStyle = '#666'; ctx.lineWidth = 1;
  ctx.strokeRect(barX, 33, barW, 10);
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('HUNGER', W / 2, 42);

  for (let i = 0; i < MAX_HEARTS; i++) drawHeart(18 + i * 30, 20, i < hearts);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 15px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(`Score: ${score}`, W - 14, 26);

  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Arrow keys: move   |   Space: shoot poison   |   Cactus = +5pts +heart', W / 2, H - 7);
}

function drawOverlay(title, titleColor, sub) {
  ctx.fillStyle = 'rgba(0,0,0,0.68)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = titleColor;
  ctx.font = 'bold 52px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(title, W / 2, H / 2 - 55);
  ctx.fillStyle = '#ffffff';
  ctx.font = '26px monospace';
  ctx.fillText(`Final score: ${score}`, W / 2, H / 2 + 5);
  ctx.fillStyle = '#aaaaaa';
  ctx.font = '18px monospace';
  ctx.fillText('Press  R  to play again', W / 2, H / 2 + 55);
}

function drawTitleScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#ffdd00';
  ctx.font = 'bold 62px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SCORPION', W / 2, H / 2 - 90);
  ctx.fillStyle = '#ff8800';
  ctx.font = 'bold 36px monospace';
  ctx.fillText('SURVIVOR', W / 2, H / 2 - 44);

  ctx.fillStyle = '#cccccc';
  ctx.font = '16px monospace';
  ctx.fillText('Survive 100 seconds. Collect apples. Avoid capture.', W / 2, H / 2 + 18);

  ctx.font = '14px monospace';
  ctx.fillStyle = '#aaaaaa';
  ctx.fillText('Arrow keys: move   |   Space: shoot poison stun', W / 2, H / 2 + 50);
  ctx.fillText('Eat apples to keep hunger up — hungry scorpions slow down!', W / 2, H / 2 + 72);
  ctx.fillText('Rare cactus = +5pts + extra heart', W / 2, H / 2 + 94);

  // Pulsing prompt
  const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 400);
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 20px monospace';
  ctx.fillText('Press  SPACE  to begin', W / 2, H / 2 + 140);
  ctx.globalAlpha = 1;
}

// Main loop
let lastTs = null;
function loop(ts) {
  if (!lastTs) lastTs = ts;
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  update(dt);

  drawBackground();
  if (state === 'playing' || state === 'win' || state === 'lose') {
    cacti.forEach(drawCactus);
    apples.forEach(drawApple);
    poisons.forEach(drawPoison);
    humans.forEach(drawHuman);
    drawScorpion();
    drawHUD();
  }

  if (state === 'title') drawTitleScreen();
  if (state === 'win')   drawOverlay('YOU SURVIVED!', '#ffdd00', '');
  if (state === 'lose')  drawOverlay('CAPTURED!',     '#ff4444', '');

  requestAnimationFrame(loop);
}

// Input
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();

  if ((e.key === ' ' || e.key === 'Enter') && state === 'title') { _initAudio(); init(); }
  if (e.key === ' ' && state === 'playing') {
    poisons.push({ x: scorpion.x, y: scorpion.y, angle: scorpion.facing, dist: 0, alive: true });
  }
  if ((e.key === 'r' || e.key === 'R') && (state === 'win' || state === 'lose')) init();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

state = 'title';
requestAnimationFrame(loop);
</script>
